services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studentos_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StudentOS_DB_2026!}
      POSTGRES_DB: studentos_db
    volumes:
      - studentos_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentos_user -d studentos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://studentos_user:${POSTGRES_PASSWORD:-StudentOS_DB_2026!}@db:5432/studentos_db
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_in_production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      GROQ_API_KEY: ${GROQ_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      UPLOAD_DIR: uploads
      RESUME_UPLOAD_DIR: resume_uploads
      MAX_FILE_SIZE_MB: 10
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - studentos_uploads:/app/uploads
      - studentos_resumes:/app/resume_uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  studentos_pgdata:
  studentos_uploads:
  studentos_resumes:
